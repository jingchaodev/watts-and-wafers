name: ci
on:
  push:
    paths: ['collectors/**', 'web/**', '.github/workflows/ci.yml']
  pull_request:

jobs:
  collectors-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: pip install pytest && python3 -m pytest collectors/tests -q
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: web/package-lock.json}
      - run: cd web && npm ci && npm run build
